name: zennopay_flutter
description: >-
  Zennopay PaymentSheet for Flutter — a thin native bridge over the native
  Zennopay iOS/Android checkout sheets (scan → amount → confirm → status). One
  call in, one PaymentResult out. The sheet renders natively, so Flutter
  partners get the exact same accessible PaymentSheet as every other Zennopay
  SDK.
version: 0.4.0
homepage: https://zennopay.in
repository: https://github.com/Zennopay/zennopay-flutter-sdk
documentation: https://github.com/Zennopay/zennopay-docs
issue_tracker: https://github.com/Zennopay/zennopay-flutter-sdk/issues

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: in.zennopay.flutter
        pluginClass: ZennopayFlutterPlugin
      ios:
        pluginClass: ZennopayFlutterPlugin
