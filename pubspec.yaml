name: zennopay_flutter
description: >-
  Zennopay PaymentSheet for Flutter — a native bridge to the Zennopay
  iOS/Android cross-border QR checkout sheet. One call in, one PaymentResult out.
version: 0.6.1
homepage: https://zennopay.in
repository: https://github.com/Zennopay/zennopay-flutter-sdk
documentation: https://github.com/Zennopay/zennopay-docs
issue_tracker: https://github.com/Zennopay/zennopay-flutter-sdk/issues

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: in.zennopay.flutter
        pluginClass: ZennopayFlutterPlugin
      ios:
        pluginClass: ZennopayFlutterPlugin
