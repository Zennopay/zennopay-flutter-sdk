name: zennopay_flutter
description: >-
  Zennopay PaymentSheet for Flutter — the embeddable, in-app cross-border QR pay
  flow (scan → amount → confirm → status) that partners embed natively. Modeled
  on Stripe's PaymentSheet: one call in, one PaymentResult out.
version: 0.2.0
homepage: https://zennopay.in
repository: https://github.com/Zennopay/zennopay-flutter
documentation: https://github.com/Zennopay/zennopay-docs
issue_tracker: https://github.com/Zennopay/zennopay-flutter/issues

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
